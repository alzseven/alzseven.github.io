<!-- Comments
================================================== -->
{% if page.comments != false %}
<div class="comments mt-5">
  <button class="btn btn-outline-dark py-2 px-5 d-block w-100 show-comments">
    <i class="fa fa-comments text-muted"></i> &nbsp; Load Comments
  </button>
  <div id="comments">
    <h4 class="mb-4">Comments</h4>
    <!-- {% include disqus.html %}      -->
    <script
      src="https://utteranc.es/client.js"
      repo="alzseven/alzseven.github.io"
      issue-term="pathname"
      theme="github-dark"
      crossorigin="anonymous"
      async
    ></script>
    <div class="clearfix"></div>
  </div>
</div>
{% endif %}
